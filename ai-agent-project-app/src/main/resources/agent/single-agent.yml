ai:
  agent:
    config:
      tables:
        singleAgent:
          app-name: singleAgent
          agent:
            agent-id: 100002
            agent-name: 单个智能体
            agent-desc: 单个智能体
          module:
            ai-api:
              base-url: https://open.bigmodel.cn/api/paas/
              api-key: your_apikey
              completions-path: v4/chat/completions
              embeddings-path: v4/embeddings
            chat-model:
              model: glm-4.6v
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: http://appbuilder.baidu.com/v2/ai_search/mcp/
                    sse-endpoint: your_apikey
                    request-timeout: 50000
                - local:
                    name: myToolCallbackProvider
              tool-skills-list:
                - type: resource
                  path: agent/skills
            agents:
              - name: photoAgent
                description: 图片识别助手.
                instruction: |
                  你是一个具有OCR功能的智能体，能够根据用户的问题，提供准确的图像识别结果。
            runner:
              agent-name: photoAgent
              pluginNameList:
                - myLogPlugin
                - myTestPlugin
